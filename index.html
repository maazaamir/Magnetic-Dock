<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MDS Project 31 | Cinematic Dock</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-text-container">
        <h1 class="bg-text">MAAZ</h1>
        <h1 class="bg-text outline">STUDIO</h1>
    </div>

    <div class="mds-cta-container">
        <a href="https://maazaamir.gumroad.com/l/golf-website-template" class="mds-btn" target="_blank">
            <span class="btn-text">Get the Starter Kit</span>
            <i class="ri-arrow-right-up-line"></i>
            <div class="btn-glow"></div>
        </a>
    </div>

    <div class="mds-dock-wrapper">
        <div class="mds-dock">
            <div class="dock-item" data-label="Home"><i class="ri-home-5-line"></i></div>
            <div class="dock-item" data-label="Work"><i class="ri-briefcase-4-line"></i></div>
            <div class="dock-item" data-label="Studio"><i class="ri-focus-3-line"></i></div>
            <div class="dock-item" data-label="Store"><i class="ri-shopping-bag-line"></i></div>
            <div class="dock-item" data-label="Socials"><i class="ri-share-line"></i></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
